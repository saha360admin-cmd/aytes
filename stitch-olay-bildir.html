<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Olay Bildir | Facility Guard</title>
<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@100..900&family=Quicksand:wght@100..900&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Shared Style Context Injection -->
<script id="tailwind-config">

        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary": "#ffffff",
                    "background": "#f8f9ff",
                    "surface-container": "#e5eeff",
                    "on-tertiary-fixed": "#2a1700",
                    "surface-bright": "#f8f9ff",

                    "inverse-primary": "#adc6ff",
                    "on-error-container": "#93000a",
                    "surface-dim": "#cbdbf5",
                    "surface-container-high": "#e7e8ee",
                    "tertiary-container": "#825100",
                    "surface-tint": "#085ac0",
                    "on-error": "#ffffff",
                    "outline-variant": "#c2c6d5",
                    "secondary-fixed": "#9df4c8",
                    "inverse-surface": "#2e3135",
                    "on-background": "#191c20",
                    "secondary-container": "#9af2c5",
                    "primary": "#004191",
                    "on-surface": "#0b1c30",
                    "on-surface-variant": "#424753",
                    "tertiary": "#623c00",
                    "on-secondary": "#ffffff",
                    "on-secondary-fixed": "#002113",
                    "on-primary-container": "#c4d5ff",
                    "on-secondary-fixed-variant": "#005236",
                    "tertiary-fixed": "#ffddb8",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-highest": "#e1e2e8",
                    "outline": "#727785",
                    "surface-container-low": "#f2f3f9",
                    "surface": "#f8f9ff",
                    "primary-fixed-dim": "#adc6ff",
                    "secondary-fixed-dim": "#81d8ad",
                    "primary-fixed": "#d8e2ff",
                    "tertiary-fixed-dim": "#fcba66",
                    "on-primary-fixed-variant": "#004395",
                    "surface-variant": "#e1e2e8",
                    "on-primary-fixed": "#001a42",
                    "error": "#ba1a1a",
                    "error-container": "#ffdad6",
                    "on-tertiary-container": "#ffcb8f",
                    "on-tertiary-fixed-variant": "#653e00",
                    "secondary": "#006c49",
                    "primary-container": "#0058be",
                    "inverse-on-surface": "#eff0f6"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-mobile": "24px",
                    "md": "16px",
                    "sm": "8px",
                    "lg": "24px",
                    "container-max": "1280px",
                    "xxl": "48px",
                    "xl": "32px",
                    "gutter": "24px",
                    "xs": "4px",
                    "base": "4px"
            },
            "fontFamily": {
                    "label-md": ["Plus Jakarta Sans"],
                    "body-md": ["Quicksand"],
                    "body-lg": ["Quicksand"],
                    "label-sm": ["Plus Jakarta Sans"],
                    "headline-lg-mobile": ["Quicksand"],
                    "display": ["Quicksand"],

                    "headline-lg": ["Quicksand"]
            },
            "fontSize": {

                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}]

          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-severity-low { @apply bg-secondary-container text-on-secondary-container ring-2 ring-secondary; }
        .active-severity-medium { @apply bg-tertiary-fixed text-on-tertiary-fixed-variant ring-2 ring-tertiary; }
        .active-severity-high { @apply bg-error-container text-on-error-container ring-2 ring-error; }
        
        /* Custom scrollbar for better mobile feel */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { @apply bg-outline-variant rounded-full; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen pb-32">
<!-- Top App Bar -->
<header class="bg-surface-container-low shadow-sm sticky top-0 z-50 flex justify-between items-center px-margin-mobile h-16 w-full">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high active:scale-90 transition-all">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary">Olay Bildir</h1>
</div>
<div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center overflow-hidden border-2 border-surface-container-highest">
<img class="w-full h-full object-cover" data-alt="A professional security officer portrait in a clean, modern uniform with a friendly but firm expression. The background is a blurred office environment with soft electric blue lighting. High-quality corporate photography style with a professional, trustworthy mood." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCghCbUx1XQ0B4FADxWJcWO5vPekx8-nipIfU5rTY-PCWPa5G7equPKkp2b3KJfOaP_cNbSjqIeiePha5k9vz7fOlLn6kS5IdF4Wbs9giZaC0Q4hLcSllozpukvEFwKW5--1ogJyt6zXhVHkOBXXf-XOwnT-h5p1tRMc5CKYxHdRsHCfxJWJZh9tpowZx011ri16Z_ibHrxLGEAqFaUAY3qIoNSZX7UaHGyTmVpm6YqBVcY2H8aQ076cBNFJKEd_0eAb3DKkmSKyk9N"/>
</div>
</header>
<main class="max-w-container-max mx-auto px-margin-mobile pt-lg space-y-lg">
<!-- Incident Type Selection -->
<section class="space-y-md">
<h2 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Olay Türü Seçin</h2>
<div class="grid grid-cols-2 gap-md">
<!-- Fire -->
<button class="incident-type-btn flex flex-col items-center justify-center p-lg bg-surface-container-lowest rounded-xl shadow-sm border-2 border-transparent hover:border-primary transition-all group" onclick="selectType(this)">
<div class="w-12 h-12 bg-error-container text-error rounded-full flex items-center justify-center mb-sm group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
</div>
<span class="font-label-md text-label-md">Yangın</span>
</button>
<!-- Theft -->
<button class="incident-type-btn flex flex-col items-center justify-center p-lg bg-surface-container-lowest rounded-xl shadow-sm border-2 border-transparent hover:border-primary transition-all group" onclick="selectType(this)">
<div class="w-12 h-12 bg-surface-container text-primary rounded-full flex items-center justify-center mb-sm group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">lock_person</span>
</div>
<span class="font-label-md text-label-md">Hırsızlık</span>
</button>
<!-- Suspicious Activity -->
<button class="incident-type-btn flex flex-col items-center justify-center p-lg bg-surface-container-lowest rounded-xl shadow-sm border-2 border-transparent hover:border-primary transition-all group" onclick="selectType(this)">
<div class="w-12 h-12 bg-tertiary-fixed text-tertiary rounded-full flex items-center justify-center mb-sm group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">visibility</span>
</div>
<span class="font-label-md text-label-md">Şüpheli Durum</span>
</button>
<!-- Maintenance -->
<button class="incident-type-btn flex flex-col items-center justify-center p-lg bg-surface-container-lowest rounded-xl shadow-sm border-2 border-transparent hover:border-primary transition-all group" onclick="selectType(this)">
<div class="w-12 h-12 bg-secondary-fixed text-secondary rounded-full flex items-center justify-center mb-sm group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">build</span>
</div>
<span class="font-label-md text-label-md">Teknik Arıza</span>
</button>
</div>
</section>
<!-- Location Information -->
<section class="space-y-md">
<h2 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Konum Bilgisi</h2>
<div class="bg-surface-container-lowest p-md rounded-xl shadow-sm flex items-center justify-between">
<div class="flex items-center gap-md">
<div class="w-10 h-10 bg-primary-fixed text-primary rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">location_on</span>
</div>
<div>
<p class="font-body-lg text-body-lg text-on-surface">B Blok - 2. Kat</p>
<p class="font-label-sm text-label-sm text-outline">Otomatik olarak algılandı</p>
</div>
</div>
<button class="text-primary font-label-md px-md py-sm hover:bg-surface-container rounded-lg transition-colors">Değiştir</button>
</div>
</section>
<!-- Description Field -->
<section class="space-y-md">
<h2 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Olay Detayları</h2>
<div class="relative">
<textarea class="w-full min-h-[160px] p-lg bg-surface-container-lowest border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all text-body-md placeholder:text-outline" placeholder="Lütfen olayı detaylı bir şekilde açıklayınız..."></textarea>
<div class="absolute bottom-4 right-4 text-outline font-label-sm">0 / 500</div>
</div>
</section>
<!-- Severity Level -->
<section class="space-y-md">
<h2 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Önem Derecesi</h2>
<div class="flex gap-sm">
<button class="severity-pill flex-1 py-md rounded-full bg-surface-container-lowest border border-outline-variant font-label-md text-center hover:bg-surface-container transition-all" onclick="setSeverity(this, 'low')">Düşük</button>
<button class="severity-pill flex-1 py-md rounded-full bg-surface-container-lowest border border-outline-variant font-label-md text-center hover:bg-surface-container transition-all" onclick="setSeverity(this, 'medium')">Orta</button>
<button class="severity-pill flex-1 py-md rounded-full bg-surface-container-lowest border border-outline-variant font-label-md text-center hover:bg-surface-container transition-all" onclick="setSeverity(this, 'high')">Yüksek</button>
</div>
</section>
<!-- Multimedia Attachments -->
<section class="space-y-md">
<h2 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Medya Ekle</h2>
<div class="flex gap-gutter">
<button class="flex-1 aspect-square bg-surface-container-lowest border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center gap-sm text-on-surface-variant hover:border-primary hover:text-primary transition-all group active:scale-95">
<span class="material-symbols-outlined text-[32px]">photo_camera</span>
<span class="font-label-sm text-label-sm">Fotoğraf Çek</span>
</button>
<button class="flex-1 aspect-square bg-surface-container-lowest border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center gap-sm text-on-surface-variant hover:border-primary hover:text-primary transition-all group active:scale-95">
<span class="material-symbols-outlined text-[32px]">videocam</span>
<span class="font-label-sm text-label-sm">Video Yükle</span>
</button>
</div>
</section>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest p-margin-mobile shadow-[0_-10px_20px_rgba(0,0,0,0.05)] rounded-t-xl z-50">
<button class="w-full py-lg bg-primary text-on-primary rounded-full font-headline-md text-headline-md shadow-lg hover:brightness-110 active:scale-95 transition-all flex items-center justify-center gap-md" id="submitReport">
<span class="material-symbols-outlined">send</span>
            Raporu Gönder
        </button>
</div>
<!-- Feedback Toast (Hidden by default) -->
<div class="fixed top-20 left-1/2 -translate-x-1/2 bg-on-secondary-container text-on-secondary px-lg py-md rounded-full shadow-xl z-[60] flex items-center gap-sm opacity-0 pointer-events-none transition-all duration-300" id="toast">
<span class="material-symbols-outlined">check_circle</span>
<span class="font-label-md">Rapor başarıyla iletildi!</span>
</div>
<script>
        function selectType(el) {
            document.querySelectorAll('.incident-type-btn').forEach(btn => {
                btn.classList.remove('border-primary', 'bg-primary-container');
                btn.querySelector('span').classList.remove('text-on-primary-container');
            });
            el.classList.add('border-primary', 'bg-primary-container');
            // Logic to handle selection state can go here
        }

        function setSeverity(el, level) {
            document.querySelectorAll('.severity-pill').forEach(btn => {
                btn.classList.remove('active-severity-low', 'active-severity-medium', 'active-severity-high', 'ring-2');
            });
            
            const colorClass = `active-severity-${level}`;
            el.classList.add(colorClass);
        }

        const submitBtn = document.getElementById('submitReport');
        const toast = document.getElementById('toast');

        submitBtn.addEventListener('click', () => {
            submitBtn.innerHTML = `
                <svg class="animate-spin h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Gönderiliyor...
            `;
            
            setTimeout(() => {
                submitBtn.innerHTML = `
                    <span class="material-symbols-outlined">send</span>
                    Raporu Gönder
                `;
                toast.classList.remove('opacity-0', 'pointer-events-none');
                toast.classList.add('translate-y-4');
                
                setTimeout(() => {
                    toast.classList.add('opacity-0', 'pointer-events-none');
                    toast.classList.remove('translate-y-4');
                }, 3000);
            }, 1500);
        });

        // Micro-interaction for text area
        const textarea = document.querySelector('textarea');
        const counter = document.querySelector('.absolute.bottom-4.right-4');
        textarea.addEventListener('input', () => {
            const count = textarea.value.length;
            counter.textContent = `${count} / 500`;
            if(count > 450) counter.classList.add('text-error');
            else counter.classList.remove('text-error');
        });
    </script>
</body></html>
