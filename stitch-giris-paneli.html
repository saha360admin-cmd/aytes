<!-- Interactive script for button effects -->
<script>
        document.querySelectorAll('.department-card').forEach(button => {
            button.addEventListener('touchstart', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('touchend', () => {
                button.classList.remove('scale-95');
            });
        });

        // Subtle animation for background blobs
        const blobs = document.querySelectorAll('.blob-bg');
        let tick = 0;
        function animateBlobs() {
            tick += 0.005;
            blobs.forEach((blob, i) => {
                const x = Math.sin(tick + i) * 20;
                const y = Math.cos(tick + i) * 20;
                blob.style.transform = `translate(${x}px, ${y}px)`;
            });
            requestAnimationFrame(animateBlobs);
        }
        animateBlobs();
    </script>
