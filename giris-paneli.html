<style>
        .glass-effect {
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.8);
        }
        .btn-hover-effect:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(0, 88, 190, 0.5);
        }

      min-height: max(884px, 100dvh);

<body class="bg-background min-h-screen flex flex-col font-body-md text-on-background selection:bg-primary-fixed-dim selection:text-on-primary-fixed overflow-x-hidden">
<!-- TopAppBar -->
<header class="w-full top-0 bg-background flex items-center justify-center w-full py-md px-margin-mobile md:px-lg z-50">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">hub</span>
<h1 class="font-display text-display font-bold text-primary">AYTES</h1>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-margin-mobile py-xl relative overflow-hidden">
<!-- Decorative Background Elements -->
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-fixed-dim opacity-20 blur-[100px] rounded-full"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-secondary-fixed opacity-20 blur-[100px] rounded-full"></div>
<!-- Login Panel Card -->
<div class="w-full max-w-[480px] bg-surface-container-lowest shadow-md rounded-xl p-lg md:p-xl flex flex-col gap-xl relative z-10 animate-in fade-in slide-in-from-bottom-8 duration-700">
<div class="text-center space-y-sm">
<h2 class="font-headline-lg text-headline-lg text-on-surface">Hoş Geldiniz</h2>
<p class="font-body-md text-on-surface-variant">Lütfen giriş yapmak istediğiniz departmanı seçin.</p>
</div>
<!-- Login Buttons Group -->
<div class="flex flex-col gap-md">
<!-- İdari İşler -->
<button class="group flex items-center gap-md bg-primary-container text-white px-lg py-md rounded-full btn-hover-effect transition-all duration-300 w-full active:scale-95">
<div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">admin_panel_settings</span>
</div>
<span class="font-label-md text-label-md grow text-left">İdari İşler Giriş</span>
<span class="material-symbols-outlined opacity-50 group-hover:opacity-100 group-hover:translate-x-1 transition-all">chevron_right</span>
</button>
<!-- Güvenlik -->
<button class="group flex items-center gap-md bg-primary-container text-white px-lg py-md rounded-full btn-hover-effect transition-all duration-300 w-full active:scale-95">
<div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<span class="font-label-md text-label-md grow text-left">Güvenlik Giriş</span>
<span class="material-symbols-outlined opacity-50 group-hover:opacity-100 group-hover:translate-x-1 transition-all">chevron_right</span>
</button>
<!-- Teknik -->
<button class="group flex items-center gap-md bg-primary-container text-white px-lg py-md rounded-full btn-hover-effect transition-all duration-300 w-full active:scale-95">
<div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">engineering</span>
</div>
<span class="font-label-md text-label-md grow text-left">Teknik Giriş</span>
<span class="material-symbols-outlined opacity-50 group-hover:opacity-100 group-hover:translate-x-1 transition-all">chevron_right</span>
</button>
<!-- Temizlik -->
<button class="group flex items-center gap-md bg-primary-container text-white px-lg py-md rounded-full btn-hover-effect transition-all duration-300 w-full active:scale-95">
<div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">cleaning_services</span>
</div>
<span class="font-label-md text-label-md grow text-left">Temizlik Giriş</span>
<span class="material-symbols-outlined opacity-50 group-hover:opacity-100 group-hover:translate-x-1 transition-all">chevron_right</span>
</button>
</div>
<!-- Footer Links -->
<div class="flex items-center justify-center gap-lg border-t border-outline-variant pt-lg mt-sm">
<a class="text-label-sm font-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Yardım Merkezi</a>
<div class="w-1 h-1 rounded-full bg-outline-variant"></div>
<a class="text-label-sm font-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Şifremi Unuttum</a>
</div>
</div>
<!-- Decorative Illustration Card (Asymmetric Layout element) -->
<div class="hidden lg:block absolute left-xxl bottom-xl w-64 h-64 bg-surface-container rounded-xl shadow-md rotate-[-6deg] p-lg">
<div class="space-y-md">
<div class="w-12 h-12 rounded-full bg-primary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-primary">tips_and_updates</span>
</div>

<p class="font-body-md text-on-surface-variant">Giriş yaptıktan sonra tüm yönetim araçlarına tek panelden erişebilirsiniz.</p>
</div>

<!-- Bottom Navigation Shell (Only for top-level context, suppressed for login but shown here as requested by design prompt's "modern UI" inclusion of shared components) -->

<nav class="md:hidden fixed bottom-0 w-full z-50 flex justify-around items-center px-margin-mobile py-sm bg-surface-container-lowest shadow-md rounded-t-lg">

<span class="material-symbols-outlined">admin_panel_settings</span>
<span class="font-label-sm text-label-sm">İdari</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors p-sm rounded-lg" href="#">
<span class="material-symbols-outlined">security</span>
<span class="font-label-sm text-label-sm">Güvenlik</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors p-sm rounded-lg" href="#">
<span class="material-symbols-outlined">engineering</span>
<span class="font-label-sm text-label-sm">Teknik</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors p-sm rounded-lg" href="#">
<span class="material-symbols-outlined">cleaning_services</span>
<span class="font-label-sm text-label-sm">Temizlik</span>
</a>
</nav>
<!-- Floating Atmosphere -->
<script>
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;

            const card = document.querySelector('.bg-surface-container-lowest');
            if (card) {
                const moveX = (x - 0.5) * 10;
                const moveY = (y - 0.5) * 10;
                card.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });
    </script>
</body></html>
