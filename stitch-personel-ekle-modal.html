<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PersonnelPro - Yeni Personel</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-surface-variant": "#424753",
                      "secondary-container": "#9af2c5",
                      "on-tertiary-container": "#ffcb8f",
                      "on-primary-fixed-variant": "#004395",
                      "surface-container": "#e5eeff",
                      "on-secondary-container": "#0c714d",
                      "tertiary-fixed": "#ffddb8",
                      "on-secondary-fixed-variant": "#005236",
                      "surface-dim": "#cbdbf5",
                      "secondary-fixed": "#9df4c8",
                      "on-secondary": "#ffffff",
                      "inverse-on-surface": "#eff0f6",
                      "on-primary-container": "#c4d5ff",
                      "inverse-primary": "#adc6ff",
                      "tertiary-fixed-dim": "#fcba66",
                      "error": "#ba1a1a",
                      "surface-tint": "#085ac0",
                      "primary-fixed-dim": "#adc6ff",
                      "on-error": "#ffffff",
                      "surface-variant": "#e1e2e8",
                      "on-background": "#191c20",
                      "on-surface": "#0b1c30",
                      "surface-container-low": "#f2f3f9",
                      "on-primary-fixed": "#001a42",
                      "error-container": "#ffdad6",
                      "primary": "#004191",
                      "tertiary-container": "#825100",
                      "inverse-surface": "#2e3135",
                      "surface": "#f8f9ff",
                      "surface-container-highest": "#e1e2e8",
                      "secondary": "#006c49",
                      "primary-fixed": "#d8e2ff",
                      "background": "#f8f9ff",
                      "on-tertiary": "#ffffff",
                      "surface-container-high": "#e7e8ee",
                      "on-tertiary-fixed": "#2a1700",
                      "on-error-container": "#93000a",
                      "surface-container-lowest": "#ffffff",
                      "outline-variant": "#c2c6d5",
                      "on-tertiary-fixed-variant": "#653e00",
                      "primary-container": "#0058be",
                      "outline": "#727785",
                      "secondary-fixed-dim": "#81d8ad",
                      "on-primary": "#ffffff",
                      "on-secondary-fixed": "#002113",
                      "tertiary": "#623c00",
                      "surface-bright": "#f8f9ff"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "spacing": {
                      "container-max": "1280px",
                      "gutter": "24px",
                      "base": "4px",
                      "xl": "32px",
                      "md": "16px",
                      "sm": "8px",
                      "margin-mobile": "24px",
                      "lg": "24px",
                      "xxl": "48px",
                      "xs": "4px"
              },
              "fontFamily": {
                      "label-md": ["Plus Jakarta Sans"],
                      "headline-lg": ["Quicksand"],
                      "label-sm": ["Plus Jakarta Sans"],
                      "headline-md": ["Quicksand"],
                      "headline-lg-mobile": ["Quicksand"],
                      "body-lg": ["Quicksand"],
                      "body-md": ["Quicksand"],
                      "display": ["Quicksand"]
              },
              "fontSize": {
                      "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                      "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.04em", "fontWeight": "600"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                      "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "500"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "display": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
              }
            },
          },
        }
      </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            -webkit-tap-highlight-color: transparent;
        }
        .modal-animate-in {
            animation: modalIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalIn {
            from { transform: translateY(100%) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen">
<!-- Background Content (Simulated Personnel List) -->
<div class="fixed inset-0 overflow-hidden opacity-40 select-none pointer-events-none">
<header class="w-full top-0 sticky bg-surface-container-low shadow-sm flex items-center justify-between px-margin-mobile py-md z-10">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-primary-container"></div>
<h1 class="font-display text-headline-md-mobile text-primary">PersonnelPro</h1>
</div>
<span class="material-symbols-outlined text-primary">notifications</span>
</header>
<main class="p-margin-mobile space-y-lg">
<div class="flex justify-between items-center">
<h2 class="font-headline-md text-headline-md-mobile">Ekibim</h2>
<div class="w-12 h-12 bg-primary rounded-full"></div>
</div>
<!-- Skeleton Cards -->
<div class="grid grid-cols-1 gap-md">
<div class="h-24 bg-surface-container-highest rounded-lg"></div>
<div class="h-24 bg-surface-container-highest rounded-lg"></div>
<div class="h-24 bg-surface-container-highest rounded-lg"></div>
<div class="h-24 bg-surface-container-highest rounded-lg"></div>
</div>
</main>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-on-background/30 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-md md:p-lg" id="modal-overlay">
<!-- Modal Container -->
<div class="modal-animate-in w-full max-w-lg bg-surface-container-lowest rounded-lg shadow-lg flex flex-col max-h-[795px] overflow-hidden" id="modal-container">
<!-- Modal Header -->
<div class="flex items-center justify-between px-lg py-lg">
<h3 class="font-headline-md text-headline-md-mobile text-on-surface">Yeni Personel Ekle</h3>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high active:scale-95 transition-all" onclick="closeModal()">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Body (Form) -->
<div class="flex-1 overflow-y-auto px-lg pb-lg space-y-lg">
<!-- Profile Image Placeholder -->
<div class="flex flex-col items-center gap-md py-md">
<div class="relative">
<div class="w-24 h-24 rounded-full bg-surface-container-low border-2 border-dashed border-outline-variant flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-outline text-4xl">person_add</span>
</div>
<button class="absolute bottom-0 right-0 w-8 h-8 bg-secondary text-on-secondary rounded-full flex items-center justify-center shadow-md">
<span class="material-symbols-outlined text-sm">photo_camera</span>
</button>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant">Fotoğraf Ekle (Opsiyonel)</p>
</div>
<form class="space-y-lg" id="personnel-form">
<!-- Name Surname Input -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-base" for="full_name">İsim Soyisim</label>
<div class="relative group">
<div class="absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">badge</span>
</div>
<input class="w-full pl-xl pr-md py-md bg-surface-container-low border-transparent rounded-[16px] focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest focus:border-transparent transition-all font-body-md outline-none border border-outline-variant/30" id="full_name" name="full_name" placeholder="Ahmet Yılmaz" type="text"/>
</div>
</div>
<!-- Phone Number Input -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-base" for="phone">Telefon Numarası</label>
<div class="relative group">
<div class="absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">phone</span>
</div>
<input class="w-full pl-xl pr-md py-md bg-surface-container-low border-transparent rounded-[16px] focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest focus:border-transparent transition-all font-body-md outline-none border border-outline-variant/30" id="phone" name="phone" placeholder="05__ ___ __ __" type="tel"/>
</div>
</div>
<!-- Location Select -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-base" for="location">Görev Bölgesi</label>
<div class="relative group">
<div class="absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">location_on</span>
</div>
<select class="w-full pl-xl pr-md py-md bg-surface-container-low border-transparent rounded-[16px] focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest focus:border-transparent transition-all font-body-md outline-none border border-outline-variant/30 appearance-none" id="location" name="location">
<option disabled="" selected="" value="">Bölge Seçiniz</option>
<option value="a_blok">A Blok</option>
<option value="b_blok">B Blok</option>
<option value="teknik">Teknik Giriş</option>
<option value="otopark">Otopark</option>
</select>
<div class="absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-outline">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
</form>
</div>
<!-- Modal Actions -->
<div class="p-lg bg-surface-container-lowest border-t border-outline-variant/10 flex flex-col gap-md">
<button class="w-full bg-primary text-on-primary py-md px-lg rounded-full font-label-md text-label-md shadow-md active:scale-95 transition-transform flex items-center justify-center gap-sm" onclick="handleSubmit()">
<span class="material-symbols-outlined text-md">person_add</span>
                    Personel Ekle
                </button>
<button class="w-full bg-surface-container-low text-on-surface-variant py-md px-lg rounded-full font-label-md text-label-md hover:bg-surface-container-high active:scale-95 transition-all" onclick="closeModal()">
                    İptal
                </button>
</div>
</div>
</div>
<!-- Feedback Toast (Hidden by default) -->
<div class="fixed bottom-margin-mobile left-1/2 -translate-x-1/2 z-[100] translate-y-20 opacity-0 transition-all duration-500" id="toast">
<div class="bg-on-secondary-container text-on-secondary flex items-center gap-sm px-lg py-md rounded-full shadow-lg">
<span class="material-symbols-outlined text-secondary-container">check_circle</span>
<span class="font-label-md text-label-md">Personel başarıyla eklendi!</span>
</div>
</div>
<script>
        function closeModal() {
            const modal = document.getElementById('modal-container');
            const overlay = document.getElementById('modal-overlay');
            
            modal.style.transition = 'all 0.3s ease-in';
            modal.style.transform = 'translateY(100%)';
            overlay.style.transition = 'opacity 0.3s ease';
            overlay.style.opacity = '0';
            
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 300);
        }

        function handleSubmit() {
            const name = document.getElementById('full_name').value;
            const phone = document.getElementById('phone').value;
            const location = document.getElementById('location').value;

            if(!name || !phone || !location) {
                // Shake effect on empty inputs
                const modal = document.getElementById('modal-container');
                modal.classList.add('animate-shake');
                setTimeout(() => modal.classList.remove('animate-shake'), 400);
                return;
            }

            // Success feedback
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                closeModal();
            }, 800);

            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // Close on clicking outside the modal content
        document.getElementById('modal-overlay').addEventListener('click', (e) => {
            if (e.target.id === 'modal-overlay') {
                closeModal();
            }
        });
    </script>
<style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }
        .animate-shake {
            animation: shake 0.4s ease-in-out;
        }
    </style>
</body></html>
