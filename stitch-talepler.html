<style>
        body {
            font-family: 'Quicksand', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .request-type-card.active {
            background-color: #0058be;
            color: white;
            transform: scale(1.05);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- Top App Bar (Shared Component) -->
<header class="w-full top-0 sticky z-50 bg-surface shadow-sm flex items-center justify-between px-margin-mobile h-16">
<div class="flex items-center gap-3 active:scale-95 transition-transform duration-200">
<div class="w-10 h-10 rounded-full overflow-hidden bg-primary-fixed">
<img class="w-full h-full object-cover" data-alt="A professional close-up portrait of a security guard in a modern dark blue uniform. The lighting is soft and professional, set against a blurred background of a modern glass office building. The aesthetic is clean, trustworthy, and high-quality, fitting a corporate security app." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC5xzZf8L0Mv58jIb-f-bY-hEcjP7ZdnqjujU9MFPGig4gw-L7FG6K_8dOm3dW_PpPgUBuEF3ap5XrLnWbpbE_ZboVCBoYmU1IyEiALmyHQ11X6p9eoRNmG1-ZnpVzjVYqiHoYxz7ugH1zaidgBwVR4dc-ODW7NbRWHgLtCcZS7dXmqNOoNPtGuNCHlJV5SVCOrZdBZ8LrGyUsoPL10rAREEGpbYylpsRlInekm_pVIvDOKUqw_Czy3_JCmmwTu_hsMW8yvN001KUeP"/>
</div>
<span class="font-headline-md text-headline-md font-bold text-primary">ShieldGuard</span>
</div>
<button class="material-symbols-outlined p-2 rounded-full hover:bg-surface-container-high transition-colors text-primary active:scale-95 transition-transform duration-200" data-icon="notifications">
            notifications
        </button>
</header>
<!-- Main Content Canvas -->
<main class="px-margin-mobile pt-lg max-w-container-max mx-auto">
<!-- Header Section -->
<div class="mb-xl">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-xs">Talep Oluştur</h1>
<p class="font-body-md text-on-surface-variant">Lütfen oluşturmak istediğiniz talep türünü seçin ve detayları girin.</p>
</div>
<!-- Request Types Selection Area -->
<section class="mb-xl overflow-x-auto pb-4 -mx-margin-mobile px-margin-mobile">
<div class="flex gap-md w-max">
<!-- Unpaid Leave -->
<button class="request-type-card flex flex-col items-center justify-center p-md bg-surface-container-lowest shadow-sm rounded-xl border border-outline-variant w-28 h-32 transition-all active:scale-90 group" onclick="selectRequest(this)">
<span class="material-symbols-outlined text-primary group-[.active]:text-white mb-sm text-3xl" data-icon="beach_access">beach_access</span>
<span class="font-label-md text-center">Ücretsiz İzin</span>
</button>
<!-- Annual Leave -->
<button class="request-type-card flex flex-col items-center justify-center p-md bg-surface-container-lowest shadow-sm rounded-xl border border-outline-variant w-28 h-32 transition-all active:scale-90 group" onclick="selectRequest(this)">
<span class="material-symbols-outlined text-primary group-[.active]:text-white mb-sm text-3xl" data-icon="calendar_month">calendar_month</span>
<span class="font-label-md text-center">Yıllık İzin</span>
</button>
<!-- Doctor's Note -->
<button class="request-type-card flex flex-col items-center justify-center p-md bg-surface-container-lowest shadow-sm rounded-xl border border-outline-variant w-28 h-32 transition-all active:scale-90 group" onclick="selectRequest(this)">
<span class="material-symbols-outlined text-primary group-[.active]:text-white mb-sm text-3xl" data-icon="medical_services">medical_services</span>
<span class="font-label-md text-center">Doktor Raporu</span>
</button>
<!-- Resignation -->
<button class="request-type-card flex flex-col items-center justify-center p-md bg-surface-container-lowest shadow-sm rounded-xl border border-outline-variant w-28 h-32 transition-all active:scale-90 group" onclick="selectRequest(this)">
<span class="material-symbols-outlined text-primary group-[.active]:text-white mb-sm text-3xl" data-icon="exit_to_app">exit_to_app</span>
<span class="font-label-md text-center">İstifa</span>
</button>
<!-- Other -->
<button class="request-type-card flex flex-col items-center justify-center p-md bg-surface-container-lowest shadow-sm rounded-xl border border-outline-variant w-28 h-32 transition-all active:scale-90 group" onclick="selectRequest(this)">
<span class="material-symbols-outlined text-primary group-[.active]:text-white mb-sm text-3xl" data-icon="more_horiz">more_horiz</span>
<span class="font-label-md text-center">Diğer</span>
</button>
</div>
</section>
<!-- Request Details Form -->
<section class="space-y-lg">
<div class="bg-surface-container-lowest p-lg rounded-xl shadow-sm border border-outline-variant">
<label class="block font-label-md text-on-surface-variant mb-sm" for="request-details">Talebiniz Hakkında Detaylar</label>
<textarea class="w-full bg-surface-container-low border border-outline-variant rounded-md p-md focus:ring-2 focus:ring-primary focus:border-primary outline-none font-body-md transition-all resize-none" id="request-details" placeholder="Talebinizi buraya yazınız..." rows="6"></textarea>
<div class="mt-md flex items-center gap-sm text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]" data-icon="info">info</span>
<span class="font-label-sm">Talebiniz yönetici onayına sunulacaktır.</span>
</div><div class="mt-lg pt-lg border-t border-outline-variant"><p class="block font-label-md text-on-surface-variant mb-md">Dosya/Resim Ekle</p><div class="grid grid-cols-2 gap-md"><button class="flex flex-col items-center justify-center gap-sm p-md border border-outline-variant rounded-xl hover:bg-surface-container-low transition-colors active:scale-95"><span class="material-symbols-outlined text-primary" data-icon="photo_camera">photo_camera</span><span class="font-label-sm">Fotoğraf Çek</span></button><button class="flex flex-col items-center justify-center gap-sm p-md border border-outline-variant rounded-xl hover:bg-surface-container-low transition-colors active:scale-95"><span class="material-symbols-outlined text-primary" data-icon="upload_file">upload_file</span><span class="font-label-sm">Dosya Yükle</span></button></div></div>
</div>
<!-- Submit Button (Pill shaped) -->
<button class="w-full bg-primary-container text-white font-headline-md py-4 rounded-full shadow-lg hover:brightness-110 active:scale-95 transition-all flex items-center justify-center gap-sm">
<span class="material-symbols-outlined" data-icon="send">send</span>
                Talebi Gönder
            </button>
</section>
<!-- Decorative Animated Element -->
<div class="mt-xxl relative h-40 w-full overflow-hidden rounded-xl bg-primary-fixed/20 flex items-center justify-center">
<div class="relative z-10 text-center px-lg">
<p class="font-label-md text-primary font-bold">7/24 Personel Destek Hattı</p>
<p class="font-body-md text-on-surface">Yardıma mı ihtiyacınız var? Destek ekibimiz her zaman yanınızda.</p>
</div>
</div>
</main>
<!-- Bottom Navigation Bar (Shared Component) -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-surface-container-lowest shadow-[0_-2px_10px_rgba(0,0,0,0.05)] rounded-t-lg"><!-- Vardiyalar --><button class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1 hover:bg-surface-container-high active:scale-90 transition-all"><span class="material-symbols-outlined" data-icon="schedule">schedule</span><span class="font-label-sm">Vardiyalar</span></button><!-- Devriye --><button class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1 hover:bg-surface-container-high active:scale-90 transition-all"><span class="material-symbols-outlined" data-icon="verified_user">verified_user</span><span class="font-label-sm">Devriye</span></button><!-- Talepler (Active) --><button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-5 py-1 active:scale-90 transition-all"><span class="material-symbols-outlined" data-icon="assignment">assignment</span><span class="font-label-sm">Talepler</span></button><!-- Acil --><button class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1 hover:bg-surface-container-high active:scale-90 transition-all"><span class="material-symbols-outlined" data-icon="emergency">emergency</span><span class="font-label-sm">Acil</span></button></nav>
<script>
        function selectRequest(element) {
            // Remove active class from all buttons
            document.querySelectorAll('.request-type-card').forEach(card => {
                card.classList.remove('active');
                const icon = card.querySelector('.material-symbols-outlined');
                if(icon) icon.style.fontVariationSettings = "'FILL' 0";
            });
            
            // Add active class to clicked button
            element.classList.add('active');
            const icon = element.querySelector('.material-symbols-outlined');
            if(icon) icon.style.fontVariationSettings = "'FILL' 1";
            
            // Micro-interaction haptic feedback simulation
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(5);
            }
        }

        // Initialize first item as active
        window.onload = () => {
            const firstItem = document.querySelector('.request-type-card');
            if (firstItem) selectRequest(firstItem);
        };
    </script>
</body></html>
